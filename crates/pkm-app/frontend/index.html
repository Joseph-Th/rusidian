<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PKM - Personal Knowledge Workbench</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      h1 {
        color: #333;
      }
      button {
        background: #007acc;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        margin: 5px;
      }
      button:hover {
        background: #005a9e;
      }
      input {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        margin: 5px;
      }
      #noteList {
        margin-top: 20px;
      }
      .note-item {
        background: #f9f9f9;
        padding: 10px;
        margin: 5px 0;
        border-left: 4px solid #007acc;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Personal Knowledge Workbench</h1>
      <p>Application is starting...</p>
      <div>
        <input type="text" id="noteTitle" placeholder="Note title" />
        <button onclick="createNote()">Create Note</button>
        <button onclick="listNotes()">List Notes</button>
      </div>
      <div id="noteList"></div>
    </div>
    <script>
      async function createNote() {
        const title = document.getElementById('noteTitle').value;
        if (!title) {
          alert('Please enter a title');
          return;
        }
        try {
          const result = await window.__TAURI__.invoke('create_note', { title });
          alert('Note created: ' + result.id);
          document.getElementById('noteTitle').value = '';
          await listNotes();
        } catch (error) {
          alert('Error: ' + error);
        }
      }

      async function listNotes() {
        try {
          const notes = await window.__TAURI__.invoke('list_notes', { limit: 10 });
          const listDiv = document.getElementById('noteList');
          listDiv.innerHTML = '';
          if (notes.length === 0) {
            listDiv.innerHTML = '<p>No notes found</p>';
          } else {
            const title = document.createElement('h2');
            title.textContent = 'Notes (' + notes.length + ')';
            listDiv.appendChild(title);
            notes.forEach(note => {
              const item = document.createElement('div');
              item.className = 'note-item';
              item.innerHTML = `<strong>${note.title}</strong><br><small>${note.id}</small>`;
              listDiv.appendChild(item);
            });
          }
        } catch (error) {
          alert('Error: ' + error);
        }
      }
    </script>
  </body>
</html>
